<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Textos arriba</title>
  <style>
    /* Fuentes y colores */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      margin: 0;
      padding: 0 20px;
    }

    h1, h2 {
      text-align: center;
      color: #2c3e50;
      margin-top: 20px;
    }

    a {
      color: #3498db;
      text-decoration: none;
      transition: color 0.3s;
    }

    a:hover {
      color: #1d6fa5;
      text-decoration: underline;
    }

    /* Contenedor principal */
    .container {
      max-width: 1000px;
      margin: 30px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* Lista de textos */
    ul {
      list-style-type: none;
      padding: 0;
    }

    li {
      border-bottom: 1px solid #ddd;
      padding: 15px 0;
    }

    li:last-child {
      border-bottom: none;
    }

    .texto-titulo {
      font-size: 1.2em;
      font-weight: bold;
      color: #2c3e50;
    }

    .fecha {
      font-size: 0.9em;
      color: #888;
      margin-left: 10px;
    }


    .btn-histograma {
      margin-top: 8px;
      padding: 6px 12px;
      background-color: #3498db;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .btn-histograma:hover {
      background-color: #1d6fa5;
    }

    /* Cuadro para el histograma */
    #cuadro-histograma {
      display: none;
      margin-top: 25px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fafafa;
    }

    #cuadro-histograma h3 {
      margin-bottom: 15px;
      text-align: center;
      color: #2c3e50;
    }

    /* Imagen del histograma con scroll */
    #imagen-histograma {
      display: block;
      max-height: 600px;
      margin: 0 auto;
    }

    .scroll-x {
      overflow-x: auto;
      padding-bottom: 10px;
    }

  </style>
</head>
<body>
  <div class="container">
    <h2>Textos subidos</h2>
    <a href="{% url 'subir_texto' %}" class="btn-histograma">➕ Subir otro texto</a>
    <ul>
      {% for texto in textos %}
        <li>
          <span class="texto-titulo">{{ texto.nombre }}</span> 
          <span class="fecha">{{ texto.fecha_subida }}</span>
          [ <a href="{{ texto.archivo.url }}">ver .txt</a> ]
          <br>
       
            <!-- Selector de N y accesos dinámicos -->
<div style="margin-top:8px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
  <label for="n-{{ texto.pk }}">N:</label>
  <input id="n-{{ texto.pk }}" type="number" min="1" value="2"
         style="width:70px; padding:6px 8px; border-radius:6px; border:1px solid #ccc;">

  <!-- Unigramas (tu vista de barras por palabra) -->
  <a href="{% url 'histograma_palabras' texto.pk %}"
     class="btn-histograma" style="background:#16a085">Unigramas</a>

  
  <a href="{% url 'elegir_ngrama' texto.pk %}"
     class="btn-histograma" style="background:#f39c12">Elegir N-gramas</a>

  <a href="#" class="btn-histograma" style="background:#34495e"
     onclick="goProb({{ texto.pk }}, getN('{{ texto.pk }}'), false); return false;">
     MLE n-gramas
  </a>

  <a href="#" class="btn-histograma" style="background:#2c3e50"
     onclick="goProb({{ texto.pk }}, getN('{{ texto.pk }}'), true); return false;">
     MLE n-gramas + fronteras
  </a>

  <a href="#" class="btn-histograma" style="background:#7f8c8d"
     onclick="goComparar({{ texto.pk }}, getN('{{ texto.pk }}')); return false;">
     Comparar (n-gramas)
  </a>
</div>



        </li>
      {% endfor %}
    </ul>

    <div id="cuadro-histograma">
      <h3>Histograma de palabras</h3>
      <div class="scroll-x">
        <img id="imagen-histograma" src="" alt="Histograma">
      </div>
    </div>
  </div>

  <script>
function mostrarHistograma(idTexto) {
    const cuadro = document.getElementById("cuadro-histograma");
    const imagen = document.getElementById("imagen-histograma");

    // Usamos la URL de Django y luego sustituimos el número dinámicamente
    let url = "{% url 'histograma_palabras' 0 %}";
    url = url.replace("0", idTexto);

    imagen.src = url + "?t=" + new Date().getTime();
    cuadro.style.display = "block";
}
</script>
<script>
function getN(pk){
  const el = document.getElementById('n-' + pk);
  let n = parseInt((el && el.value) ? el.value : '2', 10);
  if (isNaN(n)) n = 2;
  if (n < 1) n = 1;
  el.value = n; // normaliza en pantalla
  return n;
}

// Usa las rutas con name y sustituye parámetros sin hardcodear prefijos
function goProb(pk, n, conFronteras){
  let url = "{% url 'prob_ngramas' 0 1 %}";
  url = url.replace('/0/','/' + pk + '/').replace('/1/','/' + n + '/');
  if (conFronteras) url += '?fronteras=1';
  window.location.href = url;
}

function goComparar(pk, n){
  let url = "{% url 'comparar_prob_ngramas' 0 1 %}";
  url = url.replace('/0/','/' + pk + '/').replace('/1/','/' + n + '/');
  window.location.href = url;
}

</script>

</body>
</html>
